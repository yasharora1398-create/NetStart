<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` lets the page draw into the iOS
         notch / dynamic island area so env(safe-area-inset-*) is
         non-zero and the mobile bottom nav can avoid the home
         indicator without leaving a white strip above it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Default to the dark surface so phone chrome (status bar /
         Android nav bar) doesn't flash white before useTheme runs.
         The boot script below corrects to light if that's what
         the user picked previously. -->
    <meta name="theme-color" content="#050505" />

    <!-- Title + description are tuned for the homepage. usePageMeta
         (src/hooks/usePageMeta.ts) overrides these per-route at
         runtime so /how, /signup, /terms etc. each get their own
         title/description for SEO + browser-tab clarity. -->
    <title>Polln8 | How to find a cofounder, technical cofounder, or startup to join</title>
    <meta name="description" content="How to find a cofounder online: Polln8 matches founders with vetted technical cofounders, CTOs, and non-technical cofounders, and matches operators looking to join a startup as a cofounder or early employee. Equity-aligned, mutual matches only." />
    <meta name="keywords" content="how to find a cofounder, how to find a technical cofounder, where to find a cofounder, find a cofounder online, looking for a technical cofounder, find a cto for my startup, find a non-technical cofounder, how to join a startup, join a startup as a cofounder, early employee startup jobs, startup jobs equity, become a startup cofounder, polln8" />
    <meta name="author" content="Polln8" />
    <meta name="application-name" content="Polln8" />
    <meta name="apple-mobile-web-app-title" content="Polln8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <meta property="og:site_name" content="Polln8" />
    <meta property="og:title" content="Polln8 | How to find a cofounder, technical cofounder, or startup to join" />
    <meta property="og:description" content="Find a cofounder, a technical cofounder, a CTO, or a startup to join as an early cofounder or employee. Vetted profiles, mutual matches only." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://polln8.com" />
    <meta property="og:image" content="https://polln8.com/polln8-og.png" />
    <meta property="og:image:secure_url" content="https://polln8.com/polln8-og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Polln8 | Cofounder matchmaking. Vetted. Mutual." />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Polln8 | How to find a cofounder or join a startup" />
    <meta name="twitter:description" content="Find a cofounder, a technical cofounder, a CTO, or a startup to join as an early cofounder or employee. Vetted profiles, mutual matches only." />
    <meta name="twitter:image" content="https://polln8.com/polln8-og.png" />
    <meta name="twitter:image:alt" content="Polln8 | Cofounder matchmaking. Vetted. Mutual." />

    <!-- Favicons + touch icons. Multiple rel/sizes so every client
         (Google search, Safari pinned tab, iOS home screen, Android
         install prompt, legacy browsers asking for /favicon.ico) gets
         a real polln8 icon and never falls back to a cached Lovable
         default. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/polln8-logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/polln8-logo.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/polln8-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/polln8-logo.png" color="#050505" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="canonical" href="https://polln8.com" />

    <!-- Organization schema gives Google knowledge-panel data:
         brand name, logo, social links, sameAs URLs (add when live).
         keywords is read by Google for topical relevance scoring. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Polln8",
      "url": "https://polln8.com",
      "logo": "https://polln8.com/polln8-logo.png",
      "description": "Find a cofounder, a technical cofounder, a CTO, or a startup to join as an early cofounder or employee. Vetted profiles, mutual matches only.",
      "keywords": "how to find a cofounder, how to find a technical cofounder, where to find a cofounder, find a cofounder online, looking for a technical cofounder, find a cto for my startup, find a non-technical cofounder, how to join a startup, join a startup as a cofounder, early employee startup jobs, startup jobs equity, become a startup cofounder",
      "sameAs": []
    }
    </script>
    <!-- WebSite schema lets Google show a sitelinks search box (when
         we have search routes that accept ?q= queries). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Polln8",
      "url": "https://polln8.com"
    }
    </script>
    <!-- FAQPage schema. Each Question is one of the target search
         queries verbatim, so Google can match a user typing it into
         the search box and surface us as a candidate answer (and
         eligibly render the question/answer pair as a rich result).
         The phrasing of the Name fields must stay identical to the
         queries we want to rank for. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How to find a cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use Polln8. We're private matchmaking for cofounders: every profile is reviewed by a human, every match is mutual, and most users get their first matches in under 24 hours."
          }
        },
        {
          "@type": "Question",
          "name": "How to find a technical cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Post what you're building on Polln8. We surface vetted technical operators (engineers, CTOs, founding engineers) whose skills and commitment actually match your project, not a list of names you have to cold-DM."
          }
        },
        {
          "@type": "Question",
          "name": "Where to find a cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On Polln8. Twitter DMs and YC's cofounder matcher are noisy. Polln8 is a private, vetted network that only shows you people who have been reviewed and who are actively looking."
          }
        },
        {
          "@type": "Question",
          "name": "How to find a cofounder online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up at polln8.com, tell us who you are, and we review you in under 24 hours. Once you're in you can browse founders and operators, accept the ones who fit, and chat as soon as the other side accepts back."
          }
        },
        {
          "@type": "Question",
          "name": "I'm looking for a technical cofounder. What's the fastest way?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Polln8 is built for this. Post your project once and we route it to vetted technical operators (engineers, CTOs, founding engineers) who are actively looking for a startup to join."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find a CTO for my startup?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Post your project on Polln8. We match founders with operators who are CTO-level and looking for equity-aligned startups to join — not contractors, not freelancers."
          }
        },
        {
          "@type": "Question",
          "name": "How to find a non-technical cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Polln8 matches both sides. Builders can browse vetted non-technical founders with real go-to-market, sales, design, or operations chops who are looking for a technical partner."
          }
        },
        {
          "@type": "Question",
          "name": "How to join a startup?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On Polln8 you browse the projects vetted founders are actively building. See the stage, the equity they're offering, and exactly what they need — then request to chat. No job-board noise."
          }
        },
        {
          "@type": "Question",
          "name": "Can I join a startup as a cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Polln8 is built around cofounder-level joins: you swipe through founders looking for cofounders or founding engineers, with equity terms up front. Mutual interest before any commitment."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I find early employee startup jobs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Polln8. Every project on Polln8 is a vetted early-stage startup actively looking for cofounder-tier or founding-employee-tier hires — not a 200-person company with an open req."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find startup jobs with equity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Browse Polln8. Every project lists what equity is on the table up front, so you only chat with founders whose terms you can actually accept."
          }
        },
        {
          "@type": "Question",
          "name": "How do I become a startup cofounder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sign up on Polln8 as a builder. We vet your background, surface you to founders whose project fits your skills, and open a chat the moment both sides accept. No DMing strangers, no cold pitches."
          }
        }
      ]
    }
    </script>

    <!-- Privacy-friendly analytics. No cookies, no cross-site tracking. -->
    <script defer data-domain="polln8.com" src="https://plausible.io/js/script.js"></script>
  </head>

  <body>
    <!-- Apply the saved theme before React mounts so dark-mode users
         don't see a flash of the light palette during boot. Mirrors
         the logic in src/hooks/useTheme.ts. Also syncs the
         <meta name="theme-color"> so the phone status bar matches
         the surface from the very first paint. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("polln8_web_theme");
          var mode = saved === "light" || saved === "dark" ? saved : "dark";
          if (mode === "dark") document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute("content", mode === "dark" ? "#050505" : "#FAFAF7");
          }
        } catch (e) { /* localStorage blocked — ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
