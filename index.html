<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` lets the page draw into the iOS
         notch / dynamic island area so env(safe-area-inset-*) is
         non-zero and the mobile bottom nav can avoid the home
         indicator without leaving a white strip above it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Default to the dark surface so phone chrome (status bar /
         Android nav bar) doesn't flash white before useTheme runs.
         The boot script below corrects to light if that's what
         the user picked previously. -->
    <meta name="theme-color" content="#050505" />

    <!-- Title + description are tuned for the homepage. usePageMeta
         (src/hooks/usePageMeta.ts) overrides these per-route at
         runtime so /how, /signup, /terms etc. each get their own
         title/description for SEO + browser-tab clarity. -->
    <title>Polln8 | Find a Cofounder or a Startup to Join</title>
    <meta name="description" content="Find a cofounder, or find a startup to join. Polln8 matches founders with vetted technical cofounders and founding engineers, and matches operators with early-stage startups worth joining." />
    <meta name="keywords" content="cofounder matchmaking, find a cofounder, find a startup to join, technical cofounder, startup cofounder, founding engineer, founding team, startup operators, startup jobs, early-stage startup, vetted startup talent, cofounder finder, cofounder dating, startup matchmaking, quality candidates, equity startup" />
    <meta name="author" content="Polln8" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <meta property="og:site_name" content="Polln8" />
    <meta property="og:title" content="Polln8 | Find a Cofounder or a Startup to Join" />
    <meta property="og:description" content="Find a cofounder, or find a startup to join. Polln8 matches founders with vetted technical cofounders and founding engineers, and matches operators with early-stage startups worth joining." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://polln8.com" />
    <meta property="og:image" content="https://polln8.com/polln8-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Polln8 | Find a Cofounder or a Startup to Join" />

    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Polln8 | Find a Cofounder or a Startup to Join" />
    <meta name="twitter:description" content="Find a cofounder, or find a startup to join. Polln8 matches founders with vetted technical cofounders and operators with early-stage startups worth joining." />
    <meta name="twitter:image" content="https://polln8.com/polln8-og.png" />
    <meta name="twitter:image:alt" content="Polln8 | Find a Cofounder or a Startup to Join" />

    <link rel="icon" type="image/png" href="/polln8-logo.png" />
    <link rel="canonical" href="https://polln8.com" />

    <!-- Organization schema gives Google knowledge-panel data:
         brand name, logo, social links, sameAs URLs (add when live). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Polln8",
      "url": "https://polln8.com",
      "logo": "https://polln8.com/polln8-logo.png",
      "description": "Find a cofounder, or find a startup to join. Polln8 matches founders with vetted technical cofounders and founding engineers, and matches operators with early-stage startups worth joining.",
      "sameAs": []
    }
    </script>
    <!-- WebSite schema lets Google show a sitelinks search box (when
         we have search routes that accept ?q= queries). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Polln8",
      "url": "https://polln8.com"
    }
    </script>

    <!-- Privacy-friendly analytics. No cookies, no cross-site tracking. -->
    <!-- Tag the actual production domain inside Plausible before this fires. -->
    <script defer data-domain="polln8.vercel.app" src="https://plausible.io/js/script.js"></script>
  </head>

  <body>
    <!-- Apply the saved theme before React mounts so dark-mode users
         don't see a flash of the light palette during boot. Mirrors
         the logic in src/hooks/useTheme.ts. Also syncs the
         <meta name="theme-color"> so the phone status bar matches
         the surface from the very first paint. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("polln8_web_theme");
          var mode = saved === "light" || saved === "dark" ? saved : "dark";
          if (mode === "dark") document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute("content", mode === "dark" ? "#050505" : "#FAFAF7");
          }
        } catch (e) { /* localStorage blocked — ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
