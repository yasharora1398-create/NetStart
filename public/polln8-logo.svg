<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Polln8 mark — stylized moth silhouette with green eyes. Drawn
       in solid forest-green-friendly tones; works as both nav logo
       and favicon. -->

  <!-- Antennae -->
  <g stroke="#0F1410" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="46" y1="28" x2="40" y2="14" />
    <line x1="54" y1="28" x2="60" y2="14" />
  </g>

  <!-- Upper-left wing -->
  <path
    d="M50 40 Q22 14, 12 32 Q10 44, 24 50 Q40 52, 50 46 Z"
    fill="#1A1A1A"
  />
  <!-- Upper-right wing -->
  <path
    d="M50 40 Q78 14, 88 32 Q90 44, 76 50 Q60 52, 50 46 Z"
    fill="#1A1A1A"
  />
  <!-- Lower-left wing -->
  <path
    d="M50 56 Q26 74, 18 60 Q22 52, 36 54 Q46 54, 50 60 Z"
    fill="#2A2A2A"
  />
  <!-- Lower-right wing -->
  <path
    d="M50 56 Q74 74, 82 60 Q78 52, 64 54 Q54 54, 50 60 Z"
    fill="#2A2A2A"
  />

  <!-- Abdomen -->
  <ellipse cx="50" cy="58" rx="5" ry="14" fill="#0F1410" />

  <!-- Thorax -->
  <ellipse cx="50" cy="44" rx="6" ry="7" fill="#0F1410" />

  <!-- Head -->
  <circle cx="50" cy="32" r="5" fill="#0F1410" />

  <!-- Green eyes -->
  <circle cx="46.5" cy="33" r="2" fill="#4FA572" />
  <circle cx="53.5" cy="33" r="2" fill="#4FA572" />
</svg>
